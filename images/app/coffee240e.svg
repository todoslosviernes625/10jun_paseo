  <!-- Lógica de Click (Pausa/Reanuda) -->
  <script
   type="text/ecmascript"
   id="script247">
    <![CDATA[
      var container = document.getElementById('escenaContainer');
      var isPaused = false;
      container.addEventListener('click', function() {
        if (isPaused) {
          container.unpauseAnimations();
          isPaused = false;
        } else {
          container.pauseAnimations();
          isPaused = true;
        }
      });
    ]]>
  </script>
